<!DOCTYPE html>
<html>
<head>
    <title>Smart Surveillance Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #111;
            color: white;
            padding: 20px;
        }
        .card {
            background: #222;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <h1>🚨 Live Detection Alerts</h1>

    {% for alert in alerts %}
    <div class="card">
        <h3>{{ alert.object }}</h3>
        <p>Confidence: {{ alert.confidence }}</p>
        <p>Time: {{ alert.time }}</p>
    </div>
    {% endfor %}
</body>
</html>
