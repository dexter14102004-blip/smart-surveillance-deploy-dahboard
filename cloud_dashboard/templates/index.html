<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Surveillance Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Inter', sans-serif;
    background: #0d1117;
    color: #e6edf3;
}

.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 30px;
    border-bottom:1px solid #30363d;
}

.header h1 {
    font-size:28px;
    color:#00e676;
}

.status-badge {
    background:#1f6feb;
    padding:8px 14px;
    border-radius:20px;
    font-size:14px;
}

.dashboard {
    display:grid;
    grid-template-columns: 2fr 1fr;
    gap:20px;
    padding:20px;
}

.card {
    background: rgba(22,27,34,0.95);
    border:1px solid #30363d;
    border-radius:18px;
    padding:20px;
    box-shadow:0 8px 30px rgba(0,0,0,0.35);
}

.video-box img {
    width:100%;
    border-radius:14px;
    border:2px solid #00e676;
}

.kpis {
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
    margin-bottom:20px;
}

.kpi {
    background:#161b22;
    padding:15px;
    border-radius:14px;
    text-align:center;
}

.kpi h2 {
    color:#00e676;
    margin-bottom:5px;
}

.controls {
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:15px;
}

button, select, input {
    padding:10px 14px;
    border:none;
    border-radius:10px;
    font-size:14px;
}

button {
    background:#00e676;
    color:#000;
    font-weight:600;
    cursor:pointer;
}

button:hover {
    transform:scale(1.03);
}

#alarmBtn {
    background:#ff5252;
    color:white;
}

input, select {
    background:#0d1117;
    color:white;
    border:1px solid #30363d;
}

.log-table {
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

.log-table th, .log-table td {
    padding:10px;
    border-bottom:1px solid #30363d;
    text-align:left;
}

.log-table th {
    color:#00e676;
}

.alert-box {
    background:#2d1b1b;
    border:1px solid #ff5252;
    color:#ffb3b3;
    padding:15px;
    border-radius:14px;
    margin-top:15px;
}

.footer {
    text-align:center;
    padding:20px;
    color:#8b949e;
    border-top:1px solid #30363d;
    margin-top:20px;
}

.hidden {
    display:none;
}
</style>
</head>
<body>

<div class="header">
    <h1>Smart Surveillance</h1>
    <div class="status-badge">YOLOv8 • LIVE</div>
</div>

<div class="dashboard">
    <!-- LEFT -->
    <div>
        <div class="kpis">
            <div class="kpi"><h2 id="personCount">0</h2><p>Persons</p></div>
            <div class="kpi"><h2 id="birdCount">0</h2><p>Birds</p></div>
            <div class="kpi"><h2 id="animalCount">0</h2><p>Animals</p></div>
            <div class="kpi"><h2 id="alertCount">0</h2><p>Alerts</p></div>
        </div>

        <div class="card">
            <h2>🎥 Live Detection Feed</h2>
            <div class="video-box" style="margin-top:15px;">
                <img id="videoFeed" src="" alt="Live Feed">
            </div>

            <!-- ✅ START CAMERA ADDED -->
            <div class="controls">
                <button onclick="startCamera()">▶ Start Camera</button>
                <button onclick="stopFeed()">⏹ Stop</button>
                <button onclick="downloadLog()">⬇ Download Log</button>
            </div>

            <div class="controls">
                <input type="file" id="videoFile">
                <button onclick="uploadVideo()">🎞 Upload Video</button>
            </div>

            <div class="controls">
                <button id="alarmBtn" onclick="toggleAlarm()">🔔 Alarm ON</button>
            </div>

            <div class="controls">
                <select id="cameraType" onchange="showSourceInput()">
                    <option value="">Select Camera Source</option>
                    <option value="ip">📱 Mobile IP Camera</option>
                    <option value="rtsp">📹 CCTV RTSP</option>
                </select>
                <input type="text" id="sourceInput" class="hidden" placeholder="Enter camera URL">
                <button id="connectBtn" class="hidden" onclick="connectCamera()">🔗 Connect</button>
            </div>
        </div>
    </div>

    <!-- RIGHT -->
    <div>
        <div class="card">
            <h2>🚨 Current Alerts</h2>
            <div class="alert-box" id="alertBox">
                No alerts detected.
            </div>
        </div>

        <div class="card" style="margin-top:20px;">
            <h2>📋 Live Detection Logs</h2>
            <table class="log-table">
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Object</th>
                        <th>Confidence</th>
                    </tr>
                </thead>
                <tbody id="logBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
let alarmEnabled = true;

function startCamera() {
    fetch("/start_camera", { method: "POST" })
    .then(() => {
        document.getElementById("videoFeed").src =
            "/video_feed?" + new Date().getTime();
    });
}

function stopFeed() {
    fetch("/stop", { method: "POST" });
    document.getElementById("videoFeed").src = "";
}

function downloadLog() {
    window.location = "/download_log";
}

function toggleAlarm() {
    alarmEnabled = !alarmEnabled;

    fetch("/toggle_alarm", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ alarm: alarmEnabled })
    });

    const btn = document.getElementById("alarmBtn");

    if (alarmEnabled) {
        btn.innerText = "🔔 Alarm ON";
        btn.style.background = "#ff5252";
    } else {
        btn.innerText = "🔕 Alarm OFF";
        btn.style.background = "#00e676";
    }
}

function showSourceInput() {
    const type = document.getElementById("cameraType").value;
    const input = document.getElementById("sourceInput");
    const btn = document.getElementById("connectBtn");

    if (type) {
        input.classList.remove("hidden");
        btn.classList.remove("hidden");
        input.placeholder = type === "ip"
            ? "Enter IP camera URL"
            : "Enter RTSP link";
    } else {
        input.classList.add("hidden");
        btn.classList.add("hidden");
    }
}

function connectCamera() {
    const type = document.getElementById("cameraType").value;
    const url = document.getElementById("sourceInput").value.trim();

    if (!url) {
        alert("Please enter camera URL");
        return;
    }

    const endpoint = type === "ip" ? "/connect_ip" : "/connect_rtsp";
    const key = type === "ip" ? "ip_link" : "rtsp_link";

    fetch(endpoint, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ [key]: url })
    })
    .then(() => {
        document.getElementById("videoFeed").src =
            "/video_feed?" + new Date().getTime();
    });
}

function uploadVideo() {
    const file = document.getElementById("videoFile").files[0];
    if (!file) return alert("Select a video");

    const formData = new FormData();
    formData.append("video", file);

    fetch("/upload_video", {
        method: "POST",
        body: formData
    }).then(() => {
        document.getElementById("videoFeed").src =
            "/video_feed?" + new Date().getTime();
    });
}

function fetchLogs() {
    fetch("/detections")
    .then(res => res.json())
    .then(data => {
        const logBody = document.getElementById("logBody");
        logBody.innerHTML = "";

        let person = 0, bird = 0, animal = 0;

        data.forEach(d => {
            if (d.object === "person") person++;
            else if (d.object === "bird") bird++;
            else animal++;

            logBody.innerHTML += `
                <tr>
                    <td>${d.time}</td>
                    <td>${d.object}</td>
                    <td>${d.confidence}</td>
                </tr>`;
        });

        document.getElementById("personCount").innerText = person;
        document.getElementById("birdCount").innerText = bird;
        document.getElementById("animalCount").innerText = animal;
        document.getElementById("alertCount").innerText = data.length;

        if (data.length > 0) {
            const last = data[data.length - 1];
            document.getElementById("alertBox").innerHTML =
                `⚠ ${last.object} detected at ${last.time}`;
        }
    });
}

setInterval(fetchLogs, 3000);
</script>

</body>
</html>
